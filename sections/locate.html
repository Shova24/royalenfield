<!-- Locate us -->
<section class="locate-us-section">
  <div class="page-container locate-us-container">
    <div class="bg-image-wrapper">
      <img src="./assets/image.jpg" />
    </div>

    <div class="overlay"></div>

    <div class="locate-us-content">
      <div class="locate-us-info">
        <h2>Locate Us</h2>
        <p>
          Find our store locations and get directions. Discover the nearest
          service centers and genuine parts distributors to you.
        </p>
      </div>
      <div class="locate-us-form">
        <form>
          <div class="form-group">
            <label for="location">Enter your location:</label>
            <input
              type="text"
              id="location"
              placeholder="Enter your location"
            />
          </div>

          <div class="form-group">
            <label for="search">Search for:</label>
            <div>
              <button>Store</button>
              <button>Service center</button>
              <button>Genuine parts distributor</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
